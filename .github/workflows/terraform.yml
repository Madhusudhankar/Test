name: Terraform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Stage 1: Static Analysis and Formatting
  validate_and_lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Check Formatting
        run: terraform fmt -check

      - name: Initialize (No Backend)
        run: terraform init -backend=false

      - name: Validate Configuration
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint

  # Stage 2: Provisioning (Runs only if Stage 1 succeeds)
  deploy:
    name: Plan & Apply
    runs-on: ubuntu-latest
    needs: validate_and_lint
    # Optional: Restrict apply to push events on main branches
    # environment: production 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      # Note: Cloud credentials/secrets must be configured for this stage
      - name: Real Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan